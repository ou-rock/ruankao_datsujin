<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据库高并发与高可用方案锦囊</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #5e6b73;
      --line: #cfd8dc;
      --paper: #ffffff;
      --band: #f6f8f6;
      --accent: #0f766e;
      --amber: #92400e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #fbfcfb;
      line-height: 1.58;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }
    .hero {
      border-bottom: 1px solid var(--line);
      padding: 12px 0 20px;
      margin-bottom: 18px;
    }
    .eyebrow {
      margin: 0 0 6px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
      font-weight: 700;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 20px;
      line-height: 1.3;
    }
    h3 {
      margin: 0 0 6px;
      font-size: 15px;
      line-height: 1.3;
    }
    .lead {
      max-width: 820px;
      color: var(--muted);
      margin: 10px 0 0;
    }
    section {
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 8px;
      padding: 16px;
      margin-top: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--band);
      padding: 12px;
    }
    .panel p { margin: 0 0 8px; }
    .panel p:last-child { margin-bottom: 0; }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--band);
      padding: 12px;
      min-height: 78px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .metric strong {
      display: block;
      font-size: 20px;
      line-height: 1.25;
    }
    .strong {
      font-weight: 700;
      color: #12312e;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      padding: 9px 12px;
      text-decoration: none;
      font-weight: 700;
      display: inline-flex;
      min-height: 40px;
      align-items: center;
    }
    .button.secondary {
      background: #fff;
      color: #063f3b;
      border-color: var(--line);
    }
    .timeline {
      display: grid;
      gap: 10px;
    }
    .day {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: var(--band);
    }
    .day-index {
      color: var(--amber);
      font-weight: 800;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chips span {
      border: 1px solid var(--line);
      background: var(--band);
      border-radius: 999px;
      padding: 6px 9px;
      font-weight: 700;
      color: #12312e;
    }
    a { color: var(--accent); }
    li + li { margin-top: 6px; }
    @media (max-width: 720px) {
      main { padding: 18px 14px 40px; }
      h1 { font-size: 25px; }
      .day { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    
<header class="hero">
  <p class="eyebrow">Reference</p>
  <h1>数据库高并发与高可用方案锦囊</h1>
  <p class="lead">把数据库、缓存、分库分表、读写分离放进架构取舍语境。</p>
  <div class="actions">
    <a class="button" href="/learning/">回学习台</a>
    <a class="button secondary" href="/learning/lessons/0001-scene-before-solution.html">第一课</a>
  </div>
</header>
<section>
  <h2>核心提纲</h2>
  <ol>
    <li>读多写少：缓存、读写分离、热点数据保护。</li><li>写入压力：分库分表、异步削峰、幂等与补偿。</li><li>高可用：主备切换、复制、故障检测、恢复目标。</li><li>一致性：强一致、最终一致、事务边界和业务补偿。</li>
  </ol>
</section>
<section>
  <h2>适用题型</h2>
  <div class="chips"><span>选择题</span><span>案例题</span><span>论文题</span></div>
</section>
<section>
  <h2>训练动作</h2>
  <div class="panel strong">为一个订单系统写出读扩展、写削峰、高可用、数据一致性四段方案。</div>
</section>
<section>
  <h2>应沉淀卡片</h2>
  <div class="grid">
    <div class="panel"><h3>场景卡</h3><p>场景卡：订单高并发</p></div><div class="panel"><h3>对比卡</h3><p>对比卡：读写分离 vs 分库分表</p></div><div class="panel"><h3>表达卡</h3><p>表达卡：一致性取舍</p></div>
  </div>
</section>

  </main>
</body>
</html>
