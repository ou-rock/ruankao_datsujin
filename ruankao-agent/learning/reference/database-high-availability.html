  <script>
(() => {
  const key = "ruankao-theme";
  let stored = null;
  try {
    stored = localStorage.getItem(key);
  } catch (_error) {
    stored = null;
  }
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  document.documentElement.dataset.theme =
    stored === "dark" || stored === "light" ? stored : (prefersDark ? "dark" : "light");
})();
</script>

  </ol>

  <h2>应沉淀卡片</h2>
  <div class="grid">
    <div class="panel"><h3>场景卡</h3><p>场景卡：订单高并发</p></div><div class="panel"><h3>对比卡</h3><p>对比卡：读写分离 vs 分库分表</p></div><div class="panel"><h3>表达卡</h3><p>表达卡：一致性取舍</p></div>
  </div>

  </main>
  <script>
(() => {
  const key = "ruankao-theme";
  const root = document.documentElement;
  const toggles = () => Array.from(document.querySelectorAll("[data-theme-toggle]"));
  const readStored = () => {
    try {
      return localStorage.getItem(key);
    } catch (_error) {
      return null;
    }
  };
  const writeStored = (theme) => {
    try {
      localStorage.setItem(key, theme);
    } catch (_error) {
      return;
    }
  };
  const preferred = () => {
    const stored = readStored();
    if (stored === "dark" || stored === "light") return stored;
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  };
  const apply = (theme) => {
    root.dataset.theme = theme;
    toggles().forEach((toggle) => {
      const dark = theme === "dark";
      toggle.setAttribute("aria-pressed", dark ? "true" : "false");
      toggle.setAttribute("aria-label", dark ? "切换日间模式" : "切换黑夜模式");
      toggle.setAttribute("title", dark ? "切换日间模式" : "切换黑夜模式");
      toggle.textContent = dark ? "日" : "夜";
    });
  };
  document.addEventListener("DOMContentLoaded", () => {
    apply(preferred());
    toggles().forEach((toggle) => {
      toggle.addEventListener("click", () => {
        const next = root.dataset.theme === "dark" ? "light" : "dark";
        writeStored(next);
        apply(next);
      });
    });
  });
})();
</script>
